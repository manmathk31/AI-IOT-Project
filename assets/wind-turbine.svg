<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="150" height="150">
  <defs>
    <linearGradient id="tower" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="#10B981" opacity="0.1"/>
  <circle cx="100" cy="100" r="60" fill="#10B981" opacity="0.15"/>

  <!-- Little green leaves floating (Sustainable theme) -->
  <g opacity="0.8">
    <path d="M 40 140 Q 50 130 60 140 Q 50 150 40 140 Z" fill="url(#leaf)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 5,-10; 0,0" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 160 120 Q 150 110 140 120 Q 150 130 160 120 Z" fill="url(#leaf)" transform="scale(0.7) translate(60, 40)">
      <animateTransform attributeName="transform" type="translate" values="0,0; -5,-15; 0,0" dur="3s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Base/Ground -->
  <path d="M 40 180 Q 100 160 160 180 L 160 200 L 40 200 Z" fill="url(#blade)"/>

  <!-- Tower -->
  <path d="M 94 80 L 106 80 L 112 180 L 88 180 Z" fill="url(#tower)"/>
  
  <!-- Hub behind -->
  <circle cx="100" cy="80" r="8" fill="#047857"/>

  <!-- Blades Group -->
  <g transform="translate(100, 80)">
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
    
    <!-- Blade 1 -->
    <path d="M -4 -8 C -10 -40 0 -70 0 -70 C 0 -70 10 -40 4 -8 Z" fill="url(#blade)"/>
    <!-- Blade 2 -->
    <path d="M -4 -8 C -10 -40 0 -70 0 -70 C 0 -70 10 -40 4 -8 Z" fill="url(#blade)" transform="rotate(120)"/>
    <!-- Blade 3 -->
    <path d="M -4 -8 C -10 -40 0 -70 0 -70 C 0 -70 10 -40 4 -8 Z" fill="url(#blade)" transform="rotate(240)"/>
  </g>

  <!-- Hub front -->
  <circle cx="100" cy="80" r="6" fill="#A7F3D0"/>
</svg>
